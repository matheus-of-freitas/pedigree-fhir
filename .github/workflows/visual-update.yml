name: Visual snapshot update

on:
  workflow_dispatch:
  schedule:
    # 06:00 UTC nightly.
    - cron: '0 6 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook static
        run: pnpm -F @pedigree/storybook build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Refresh visual snapshots
        env:
          CI: 'true'
        run: pnpm exec playwright test --update-snapshots --reporter=list || true

      - name: Open PR if snapshots changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(visual): refresh Playwright snapshots'
          branch: chore/visual-snapshot-refresh
          delete-branch: true
          title: 'chore(visual): refresh Playwright snapshots'
          body: |
            Automated nightly refresh of Playwright visual snapshots.

            **Review carefully:** any diff here is real visual drift. Either accept (intentional change) or revert (regression).
          labels: |
            visual
            automation
